services:
  # Backend Service
  - type: pserv
    name: memoria-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DB_HOST
        value: your-mysql-host.render.com
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: memoria_db
      - key: DB_USER
        value: memoria_user
      - key: DB_PASSWORD
        value: memoria_pass
    healthCheckPath: /
    autoDeploy: true

  # Frontend Static Site
  - type: web
    name: memoria-frontend
    runtime: static
    buildCommand: ""
    publishPath: ./frontend
    routes:
      - type: rewrite
        source: /api/*
        destination: https://memoria-backend.onrender.com/
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
