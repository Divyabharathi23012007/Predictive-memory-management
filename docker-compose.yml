services:
  mysql:
    image: mysql:8.0
    container_name: memoria-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: memoria_db
      MYSQL_USER: memoria_user
      MYSQL_PASSWORD: memoria_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - memoria-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memoria-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=memoria_db
      - DB_USER=memoria_user
      - DB_PASSWORD=memoria_pass
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--output-document=/dev/null", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - memoria-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: memoria-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - memoria-network

volumes:
  mysql_data:
    driver: local
  backend_data:
    driver: local

networks:
  memoria-network:
    driver: bridge
